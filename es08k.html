<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Es 08k - Email con evento change</title>
</head>
<body>
  <h3>k) Email generata con evento change</h3>
  <input id="nome" placeholder="nome">
  <input id="cognome" placeholder="cognome">
  <p id="email"></p>

  <script>
    function generaEmail() {
      const nome = document.getElementById('nome').value.trim();
      const cognome = document.getElementById('cognome').value.trim();
      document.getElementById('email').textContent =
        nome && cognome ? (nome + '.' + cognome + '@dominio.it').toLowerCase() : '';
    }
    document.getElementById('nome').addEventListener('change', generaEmail);
    document.getElementById('cognome').addEventListener('change', generaEmail);
  </script>
</body>
</html>
