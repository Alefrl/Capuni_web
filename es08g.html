<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Es 08g - Messaggio al click</title>
</head>
<body>
  <h3>g) Messaggio al click</h3>
  <button id="btn">Premi</button>
  <p id="output"></p>

  <script>
    document.getElementById('btn').addEventListener('click', function() {
      document.getElementById('output').textContent = 'Hai premuto il pulsante!';
    });
  </script>
</body>
</html>
